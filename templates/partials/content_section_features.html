{% with features=section.get_features_list %}
  {% if features %}
    <div class="features-block reveal" data-reveal-delay=".15s">
      {% if section.features_label %}<p class="label">{{ section.features_label }}</p>{% endif %}
      <ul class="feature-list feature-list--grid" role="list">
        {% for item in features %}<li>{{ item }}</li>{% endfor %}
      </ul>
    </div>
  {% endif %}
{% endwith %}
