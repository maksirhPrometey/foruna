<article class="product-card product-card--placeholder">
  <div class="product-card__image product-card__image--placeholder" aria-hidden="true">
    <div class="img-placeholder">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1" opacity=".3" aria-hidden="true">
        <rect x="8" y="8" width="32" height="32" rx="2"/>
        <circle cx="18" cy="18" r="4"/>
        <path d="M8 30l12-10 8 8 5-5 7 7"/>
      </svg>
    </div>
  </div>
  <div class="product-card__body">
    <h3 class="product-card__title">{{ title }}</h3>
    <p class="body-sm">Опис та фото з'являться після наповнення адмінкою.</p>
  </div>
</article>
