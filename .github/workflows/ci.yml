name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fortunaprint_test
          POSTGRES_USER: fortunaprint_user
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: ci-insecure-key-for-testing-only
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff mypy django-stubs

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy src --ignore-missing-imports --no-error-summary

      - name: Run tests
        run: python manage.py test --settings=config.settings.test
